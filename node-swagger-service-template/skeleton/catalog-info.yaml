apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  tags:
    - nodejs
    - backend
  links:
    - url: https://github.com/${{ values.githubOwner }}/${{ values.name }}
      title: Repository
      icon: github
    - url: https://wiki.cma-cgm.com/${{ values.name }}/runbook
      title: On-call runbook
      icon: docs
  annotations:
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: cma-cgm/${{ values.name }}/main
    sonarqube.org/project-key: cma-cgm:${{ values.name }}
spec:
  type: service
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: ${{ values.system }}
  domain: ${{ values.domain }}
  providesApis:
    - ${{ values.name }}-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{ values.name }}-api
  description: ${{ values.description }}
  tags:
    - openapi
    - hip
  annotations:
    backstage.io/techdocs-ref: dir:.
    cma-cgm.com/api-type: ${{ values.apiType }}
    {%- if values.hopexComponentCode %}
    cma-cgm.com/hopex-code: ${{ values.hopexComponentCode }}
    {%- endif %}
    {%- if values.apiLead %}
    cma-cgm.com/api-lead: ${{ values.apiLead }}
    {%- endif %}
    {%- if values.apiFactory %}
    cma-cgm.com/api-factory: ${{ values.apiFactory }}
    {%- endif %}
    {%- if values.apiDomainArchitectural %}
    cma-cgm.com/x-domain: ${{ values.apiDomainArchitectural }}
    {%- endif %}
    {%- if values.domain %}
    cma-cgm.com/domain: ${{ values.domain }}
    {%- endif %}
spec:
  type: openapi
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: ${{ values.system }}
  definition:
    $text: ./src/api/openapi.yaml
