apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: node-swagger-service-template
  title: Node.js Microservice from OpenAPI Spec
  description: Scaffolds a Node.js microservice with an OpenAPI/Swagger spec. Express, TypeScript, Docker and Backstage integration. API code generation is delegated to the build step (openapi-generator-cli).
  annotations:
    simpleicons.org/icon-slug: nodejs
    backstage.io/techdocs-ref: dir:.
  tags:
    - application
    - nodejs
spec:
  type: service
  owner: group:default/it-development-software-engineering-developer-platform
  parameters:
    - title: Service identity
      required: [name, description, owner]
      properties:
        name:
          title: Service name
          type: string
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:help: 'Unique service identifier in the Catalog. Kebab-case, e.g. quote-pricing-api'
        description:
          title: Description
          type: string
          ui:help: 'A short sentence describing the service. Shown in the Catalog.'
        owner:
          title: Owner
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Group
          ui:help: 'The team responsible for this service. They will be paged on incidents.'

    - title: Catalog placement
      required: [system, domain]
      properties:
        system:
          title: System
          type: string
          ui:help: 'Backstage system this service belongs to. E.g. pricing'
        domain:
          title: Domain
          type: string
          ui:help: 'Business domain. E.g. finance, shipping, platform'

    - title: API specification
      required: [swaggerUrl]
      properties:
        swaggerUrl:
          title: OpenAPI spec URL
          type: string
          format: uri
          description: 'URL directe vers le fichier YAML ou JSON. GitHub : raw.githubusercontent.com uniquement — pas api.github.com, pas github.com/…/blob/…'
          ui:help: 'Exemple GitHub : https://raw.githubusercontent.com/{owner}/{repo}/{branch}/{chemin-vers-spec.yaml}'

    - title: Node.js configuration
      required: [nodeVersion]
      properties:
        nodeVersion:
          title: Node.js version
          type: string
          enum: ['18', '20', '22']
          default: '20'
          ui:help: 'Version Node.js du runtime.'

    - title: Repository
      required: [githubOwner]
      properties:
        githubOwner:
          title: GitHub owner
          type: string
          default: 'cma-cgm'
          ui:help: 'GitHub organization that will own the repository. Default: cma-cgm'

    - title: Advanced (HIP metadata)
      ui:autofocus: hopexComponentCode
      properties:
        hopexComponentCode:
          title: HOPEX component code
          type: string
          pattern: '^$|^CP\d+$'
          ui:help: 'HOPEX Enterprise Architecture component code. E.g. CP00141. Optional — leave blank to omit.'
        apiType:
          title: API type
          type: string
          enum: [system, business, experience]
          default: system
          ui:enumNames:
            - System (core asset API)
            - Business (orchestration API)
            - Experience (consumer-facing API)
          ui:help: 'HIP API-led connectivity tier. Default: system.'
        apiLead:
          title: API Lead
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Group
          ui:help: 'Business owner group for this API. Default: same as service owner.'
        apiFactory:
          title: API Factory
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Group
          ui:help: 'Group that builds this API. Default: same as service owner.'
        apiDomainArchitectural:
          title: Architectural domain
          type: string
          ui:help: 'HIP architectural domain (x-domain extension). Default: same as Domain.'

  steps:
    - id: fetch-skeleton
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          domain: ${{ parameters.domain }}
          githubOwner: ${{ parameters.githubOwner }}
          nodeVersion: ${{ parameters.nodeVersion }}
          apiType: ${{ parameters.apiType }}
          apiLead: ${{ parameters.apiLead }}
          apiFactory: ${{ parameters.apiFactory }}
          apiDomainArchitectural: ${{ parameters.apiDomainArchitectural }}
          hopexComponentCode: ${{ parameters.hopexComponentCode }}
          swaggerUrl: ${{ parameters.swaggerUrl }}

    - id: publish-repo
      name: Publish repository
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.githubOwner }}&repo=${{ parameters.name }}
        description: ${{ parameters.description }}

    - id: register-catalog
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-repo'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish-repo'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        url: ${{ steps['register-catalog'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          Service **${{ parameters.name }}** scaffolded ready for API code generation from your OpenAPI specification.

          1. Clone: `git clone ${{ steps['publish-repo'].output.remoteUrl }}`
          2. Install dependencies: `npm install`
          3. Generate API code from spec: `npm run generate:api`
          4. Implement the generated controllers: create handlers for each route in `src/controllers/`
          5. Run locally: `npm run dev`
          6. Swagger UI: `http://localhost:3000/api-docs`
          7. CI pipeline starts automatically on the first push
