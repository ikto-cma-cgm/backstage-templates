apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  annotations:
    github.com/project-slug: ${{ values.destination.owner + "/" + values.destination.repo }}
    backstage.io/techdocs-ref: dir:.
  tags:
    - fullstack
    - monorepo
    - react
    - nodejs
    - typescript
  links:
    - url: https://github.com/${{ values.destination.owner }}/${{ values.destination.repo }}
      title: Repository
      icon: github
    - url: https://github.com/${{ values.destination.owner }}/${{ values.destination.repo }}/blob/${{ values.defaultBranch }}/ARCHITECTURE.md
      title: Architecture Documentation
      icon: docs
    - url: https://github.com/${{ values.destination.owner }}/${{ values.destination.repo }}/blob/${{ values.defaultBranch }}/README.md
      title: README
      icon: docs
spec:
  type: website
  lifecycle: production
  owner: ${{ values.owner }}
  {% if values.system %}system: ${{ values.system }}{% endif %}
  dependsOn:
    {%- if values.enableWebdriverIO %}
    - resource:webdriverio-e2e-testing
    {%- endif %}
    {%- if values.enableSonarQube %}
    - resource:sonarqube-quality-gate
    {%- endif %}
    {%- if values.includeDatabase %}
    - resource:postgresql-database
    {%- endif %}
    {%- if values.includeRedis %}
    - resource:redis-cache
    {%- endif %}
