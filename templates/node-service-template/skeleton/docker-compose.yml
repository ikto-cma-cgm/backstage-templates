version: '3.8'

services:
  # Node.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ${{ values.name }}
    restart: unless-stopped
    ports:
      - "${PORT:-${{ values.port }}}:${{ values.port }}"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${{ values.port }}
      - LOG_LEVEL=${LOG_LEVEL:-${{ values.logLevel }}}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - SERVICE_NAME=${SERVICE_NAME:-${{ values.name }}}
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      {%- if values.includeDatabase %}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-${{ values.name | replace("-", "_") }}}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      {%- endif %}
      {%- if values.includeRedis %}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      {%- endif %}
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - /app/node_modules
    networks:
      - app-network
    {%- if values.includeDatabase %}
    depends_on:
      - db
    {%- endif %}
    {%- if values.includeRedis %}
      - redis
    {%- endif %}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${{ values.port }}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

{%- if values.includeDatabase %}
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: ${{ values.name }}-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-${{ values.name | replace("-", "_") }}}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
{%- else %}
  # Example: PostgreSQL database (uncomment if needed)
  # db:
  #   image: postgres:15-alpine
  #   container_name: ${{ values.name }}-db
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=${DB_USER:-postgres}
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
  #     - POSTGRES_DB=${DB_NAME:-${{ values.name | replace("-", "_") }}}
  #   ports:
  #     - "${DB_PORT:-5432}:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
{%- endif %}

{%- if values.includeRedis %}
  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: ${{ values.name }}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
{%- else %}
  # Example: Redis cache (uncomment if needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: ${{ values.name }}-redis
  #   restart: unless-stopped
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5
{%- endif %}

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
