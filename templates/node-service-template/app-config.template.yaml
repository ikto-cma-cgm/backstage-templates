# ============================================================================
# NOTES
# ============================================================================
#
# 1. GitHub Token Setup:
#    - Go to https://github.com/settings/tokens
#    - Create a new Personal Access Token (classic)
#    - Select scopes: repo, workflow, write:packages
#    - Set environment variable: export GITHUB_TOKEN=ghp_xxxxx
#
# 2. Template Visibility:
#    - 'recommended' tag in template makes it appear first
#    - Tags help organize and filter templates
#
# 3. Testing:
#    - For local testing, you can point to file:// URLs
#    - Example: file:///absolute/path/to/template.yaml
#
# 4. Refreshing Templates:
#    - Templates auto-refresh periodically
#    - Force refresh: Catalog page > Template entity > Refresh button
#    - Or use API: POST /api/catalog/refresh
#
# 5. Security:
#    - Never commit GITHUB_TOKEN to version control
#    - Use environment variables or secret management
#    - Rotate tokens regularly
#
# ============================================================================
