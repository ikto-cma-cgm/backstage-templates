# Example Backstage Configuration for Node.js Service Template
# Add this configuration to your app-config.local.yaml or app-config.production.yaml

# ============================================================================
# CATALOG CONFIGURATION
# ============================================================================
catalog:
  locations:
    # Node.js Service Template - Software Template for creating new microservices
    - type: url
      target: https://github.com/ikto-cma-cgm/node-service-template/blob/main/template.yaml
      rules:
        - allow: [Template]

# ============================================================================
# GITHUB INTEGRATION (Required for template to work)
# ============================================================================
integrations:
  github:
    - host: github.com
      # Set GITHUB_TOKEN environment variable with a Personal Access Token
      # Required scopes: repo, workflow, write:packages, delete_repo
      token: ${GITHUB_TOKEN}

# ============================================================================
# SCAFFOLDER CONFIGURATION
# ============================================================================
scaffolder:
  # GitHub configuration for repository creation
  github:
    token: ${GITHUB_TOKEN}
    visibility: internal # Options: public, private, internal

  # Default author for commits
  defaultAuthor:
    name: Backstage Scaffolder
    email: backstage@ikto-cma-cgm.com

  # Default commit message
  defaultCommitMessage: 'Initial commit from Backstage Software Template'

# ============================================================================
# TECHDOCS CONFIGURATION (For template documentation)
# ============================================================================
techdocs:
  builder: 'local' # Options: local, external
  generator:
    runIn: 'local' # Options: local, docker
  publisher:
    type: 'local' # Options: local, googleGcs, awsS3, azureBlobStorage

