site_name: Node Service Template
site_description: Production-ready Node.js microservice template documentation
site_author: Platform Team

repo_url: https://github.com/your-org/node-service-template
repo_name: your-org/node-service-template

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Running Locally: getting-started/running-locally.md
  - Architecture:
      - Overview: architecture/overview.md
      - Project Structure: architecture/project-structure.md
      - Design Patterns: architecture/design-patterns.md
  - API Reference:
      - Overview: api/overview.md
      - Endpoints: api/endpoints.md
      - Authentication: api/authentication.md
  - Development:
      - Code Style: development/code-style.md
      - Git Workflow: development/git-workflow.md
      - Debugging: development/debugging.md
  - Deployment:
      - Docker: deployment/docker.md
      - Kubernetes: deployment/kubernetes.md
      - Environment Variables: deployment/environment-variables.md
  - Operations:
      - Monitoring: operations/monitoring.md
      - Logging: operations/logging.md
      - Health Checks: operations/health-checks.md
      - Troubleshooting: operations/troubleshooting.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
  - techdocs-core
