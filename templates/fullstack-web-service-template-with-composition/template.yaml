  steps:
    # 1. Fetch root monorepo structure
    - id: fetch-monorepo-root
      name: Create Monorepo Root Structure
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          configurationMode: advanced
          frontendPort: ${{ parameters.frontendPort }}
          backendPort: ${{ parameters.backendPort }}
          nodeVersion: ${{ parameters.nodeVersion }}
          includeDatabase: ${{ parameters.includeDatabase }}
          includeRedis: ${{ parameters.includeRedis }}
          includePWA: ${{ parameters.includePWA }}
          enableCICD: ${{ parameters.enableCICD }}
          enableDocker: ${{ parameters.enableDocker }}
          repoUrl: ${{ parameters.repoUrl }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    # 2. Fetch React frontend template into apps/frontend
    - id: fetch-frontend
      name: Add React Frontend
      action: fetch:template
      input:
        url: ../react-service-template/skeleton
        targetPath: ./apps/frontend
        copyWithoutTemplating:
          - '**/*.png'
          - '**/*.jpg'
          - '**/*.jpeg'
          - '**/*.gif'
          - '**/*.svg'
          - '**/*.ico'
        values:
          name: ${{ parameters.name }}-frontend
          description: Frontend for ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.frontendPort }}
          nodeVersion: ${{ parameters.nodeVersion }}
          includePWA: ${{ parameters.includePWA }}
          includeI18n: false
          enableCICD: false  # CI/CD will be at monorepo root
          enableDocker: false
          testingFramework: vitest
          e2eFramework: playwright
          includeCoverage: true
          enableLinting: true
          enableFormatting: true
          enablePreCommitHooks: false  # Handled at root
          errorTracking: none
          includeAnalytics: false
          # API configuration for backend communication
          apiUrl: http://localhost:${{ parameters.backendPort }}/api/v1

    # 3. Fetch Node.js backend template into apps/backend
    - id: fetch-backend
      name: Add Node.js Backend
      action: fetch:template
      input:
        url: ../node-service-template/skeleton
        targetPath: ./apps/backend
        values:
          name: ${{ parameters.name }}-backend
          description: Backend for ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.backendPort }}
          nodeVersion: ${{ parameters.nodeVersion }}
          includeDatabase: ${{ parameters.includeDatabase }}
          includeRedis: ${{ parameters.includeRedis }}
          enableCICD: false  # CI/CD will be at monorepo root
          enableDocker: false
          enablePrometheus: true
          enableGrafana: false
          enableSentry: false
          logLevel: info

    # 6. Publish to GitHub
    - id: publish
      name: Publish Monorepo to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: ${{ parameters.defaultBranch }}
        repoVisibility: private
        deleteBranchOnMerge: true
        gitAuthorName: ${{ user.entity.metadata.name }}
        gitAuthorEmail: ${{ user.entity.spec.profile.email }}
        topics:
          - fullstack
          - monorepo
          - react
          - nodejs
          - backstage
          - ${{ parameters.name }}

    # 7. Register in Backstage catalog
    - id: register
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl | replace('/tree/', '/blob/') }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
        icon: github

      - title: Open in Backstage Catalog
        url: ${{ steps.register.output.catalogInfoUrl }}
        icon: catalog

      - title: Clone Repository
        url: ${{ steps.publish.output.cloneUrl }}
        icon: download

      - title: View CI/CD Pipeline
        url: ${{ steps.publish.output.remoteUrl }}/actions
        icon: build

    text:
      - title: Next Steps
        content: |
          Your new full-stack monorepo **${{ parameters.name }}** has been created successfully!

          ## Monorepo Structure

          ```
          ${{ parameters.name }}/
          ├── apps/
          │   ├── frontend/    # React/Next.js application (port ${{ parameters.frontendPort }})
          │   └── backend/     # Node.js/Express service (port ${{ parameters.backendPort }})
          ├── package.json     # Workspace configuration
          ├── README.md
          └── .github/workflows/  # CI/CD pipelines
          ```

          ## Configuration Summary

          | Setting | Value |
          |---------|-------|
          | Node.js Version | ${{ parameters.nodeVersion }} |
          | Frontend Port | ${{ parameters.frontendPort }} |
          | Backend Port | ${{ parameters.backendPort }} |
          | Database (PostgreSQL) | ${{ 'Yes' if parameters.includeDatabase else 'No' }} |
          | Redis Cache | ${{ 'Yes' if parameters.includeRedis else 'No' }} |
          | CI/CD Pipeline | ${{ 'Yes' if parameters.enableCICD else 'No' }} |
          | Docker Support | ${{ 'Yes' if parameters.enableDocker else 'No' }} |
          | SonarQube | ${{ 'Yes' if parameters.enableSonarQube else 'No' }} |
          | WebdriverIO E2E | ${{ 'Yes' if parameters.enableWebdriverIO else 'No' }} |

          ## Quick Start

          1. **Clone the repository:**
             ```bash
             git clone ${{ steps.publish.output.cloneUrl }}
             cd ${{ parameters.name }}
             ```

          2. **Install all dependencies:**
             ```bash
             npm install
             ```

          3. **Start both services in development mode:**
             ```bash
             npm run dev
             ```

          4. **Access your services:**
             - Frontend: http://localhost:${{ parameters.frontendPort }}
             - Backend: http://localhost:${{ parameters.backendPort }}/api/v1
             - Backend Health: http://localhost:${{ parameters.backendPort }}/health

          ## Available Scripts

          - `npm run dev` - Start both frontend and backend in development mode
          - `npm run build` - Build both applications for production
          - `npm run test` - Run tests for both applications
          - `npm run lint` - Lint both applications
          - `npm run frontend` - Run commands in frontend only
          - `npm run backend` - Run commands in backend only

          ## Architecture

          The frontend and backend are pre-configured to communicate:
          - Frontend uses `NEXT_PUBLIC_API_URL` environment variable
          - Backend has CORS configured for frontend origin
          - Both services can be developed and deployed independently

          ## Resources

          - [Repository](${{ steps.publish.output.remoteUrl }})
          - [Backstage Catalog](${{ steps.register.output.catalogInfoUrl }})
          - [CI/CD Pipeline](${{ steps.publish.output.remoteUrl }}/actions)
          - [Architecture Documentation](${{ steps.publish.output.remoteUrl }}/blob/${{ parameters.defaultBranch }}/ARCHITECTURE.md)

          ## Support

          For questions or issues, contact the Platform Team or check the project documentation.
