openapi: "3.0.3"
info:
  title: ${{ values.name }} API
  version: "1.0.0"
  description: ${{ values.description }}
  contact:
    name: ${{ values.owner }}
  x-api-type: ${{ values.apiType }}
{%- if values.hopexComponentCode %}
  x-hopex: [${{ values.hopexComponentCode }}]
{%- endif %}
{%- if values.apiDomainArchitectural %}
  x-domain: ${{ values.apiDomainArchitectural }}
{%- endif %}
tags:
  - name: health
    description: Health check endpoints
  - name: resources
    description: Resource management
paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /resources:
    get:
      tags: [resources]
      summary: List resources
      operationId: listResources
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourcePage'
        "400":
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [resources]
      summary: Create a resource
      operationId: createResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceRequest'
      responses:
        "201":
          description: Resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        "400":
          $ref: '#/components/responses/BadRequest'
  /resources/{id}:
    get:
      tags: [resources]
      summary: Get a resource by ID
      operationId: getResource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        "404":
          $ref: '#/components/responses/NotFound'
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
    Resource:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        description:
          type: string
    ResourceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
    ResourcePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        totalElements:
          type: integer
        totalPages:
          type: integer
    Fault:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Fault'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Fault'
