openapi: "3.0.3"
info:
  title: ${{ values.name }} API
  version: "1.0.0"
  description: ${{ values.description }}
  contact:
    name: ${{ values.owner }}
  x-api-type: ${{ values.apiType }}
{%- if values.hopexComponentCode %}
  x-hopex: [${{ values.hopexComponentCode }}]
{%- endif %}
{%- if values.apiDomainArchitectural %}
  x-domain: ${{ values.apiDomainArchitectural }}
{%- endif %}
# =============================================================================
# PLACEHOLDER — remplacez ce fichier par la spec réelle de : ${{ values.apiRef }}
#
#   npm run fetch-spec   # télécharge openapi.yaml depuis ${{ values.apiEntityName }}
#   npm run generate     # régénère src/api/types.ts
#
# Ensuite, ajoutez une route dans src/router.ts par endpoint de votre spec.
# express-openapi-validator valide automatiquement les requêtes contre cette spec.
# =============================================================================
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
