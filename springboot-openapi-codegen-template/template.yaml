apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: springboot-openapi-codegen-template
  title: Spring Boot Service from OpenAPI Spec
  description: Scaffolds a Spring Boot 3 service with server stubs auto-generated from an existing OpenAPI spec entity in the Catalog.
  annotations:
    simpleicons.org/icon-slug: springboot
    backstage.io/techdocs-ref: dir:.
  tags:
    - application
    - java
    - openapi
    - composition
spec:
  type: service
  owner: group:default/it-development-software-engineering-developer-platform
  parameters:
    - title: Service identity
      required: [name, description, owner]
      properties:
        name:
          title: Service name
          type: string
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:help: 'Kebab-case, unique dans le Catalog. Ex: quote-pricing-service'
        description:
          title: Description
          type: string
          ui:help: 'Une phrase décrivant le service. Apparaîtra dans le Catalog.'
        owner:
          title: Owner
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Group
          ui:help: 'Équipe responsable. Sera paginée en cas d''incident.'

    - title: Catalog placement
      required: [system, domain]
      properties:
        system:
          title: System
          type: string
          ui:help: 'System Backstage auquel ce service appartient. Ex: pricing'
        domain:
          title: Domain
          type: string
          ui:help: 'Domain métier. Ex: finance, shipping, platform'

    - title: OpenAPI Contract
      required: [existingApiRef]
      properties:
        existingApiRef:
          title: OpenAPI Specification
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: API
                spec.type: openapi
          ui:help: 'Entité API existante (créée via swagger-template) que ce service va implémenter. Apparaîtra dans providesApis.'
    - title: Build configuration
      required: [javaVersion, groupId]
      properties:
        javaVersion:
          title: Java version
          type: string
          enum: ['17', '21']
          default: '21'
          ui:help: 'Version Java du serveur de runtime.'
        javaTool:
          title: Java Tool
          type: string
          default: 'JAVA_21'
          ui:help: 'Code outil Java pour le pipeline. JAVA_21 pour Java 21, JAVA_17 pour Java 17.'
        groupId:
          title: Maven Group ID
          type: string
          default: 'com.cma'
          ui:help: 'Identifiant Maven du groupe. Ex: com.cma'
        packageName:
          title: Java package name
          type: string
          default: 'com.example.service'
          ui:help: 'Package racine pour les classes Java. Ex: com.cma.pricing'
        springBootVersion:
          title: Spring Boot version
          type: string
          default: '3.4.2'
          ui:help: 'Version de Spring Boot. Consultez les versions supportées sur spring.io'

    - title: Repository destination
      required: [repoProvider, repoOwner]
      properties:
        repoProvider:
          title: Repository provider
          type: string
          enum: [github, gitlab]
          default: github
          ui:help: 'Plateforme cible pour publier le repository généré.'
        repoOwner:
          title: Repository owner
          type: string
          default: ikto-cma-cgm
          ui:help: 'Organisation ou namespace propriétaire du repository.'
      dependencies:
        repoProvider:
          oneOf:
            - properties:
                repoProvider:
                  enum: [github]
            - properties:
                repoProvider:
                  enum: [gitlab]
                gitlabHost:
                  title: GitLab Host
                  type: string
                  default: gitlab.com
                  ui:help: 'Hôte GitLab. Ex: gitlab.com ou gitlab.cma-cgm.com'
              required: [gitlabHost]

  steps:
    - id: fetch-springboot-skeleton
      name: Fetch Spring Boot base skeleton
      action: fetch:template
      input:
        url: https://github.com/ikto-cma-cgm/backstage-templates/tree/main/springboot-template/skeleton?ref=v0.1.0
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          domain: ${{ parameters.domain }}
          javaVersion: ${{ parameters.javaVersion }}
          javaTool: ${{ parameters.javaTool }}
          groupId: ${{ parameters.groupId }}
          packageName: ${{ parameters.packageName }}
          packagePath: ${{ parameters.packageName | replace('.', '/') }}
          springBootVersion: ${{ parameters.springBootVersion }}
          repoProvider: ${{ parameters.repoProvider }}
          repoOwner: ${{ parameters.repoOwner }}
          gitlabHost: ${{ parameters.gitlabHost }}

    - id: fetch-app-overlay
      name: Fetch OpenAPI codegen overlay
      action: fetch:template
      input:
        url: ./skeleton-overlay
        targetPath: .
        replace: true
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          domain: ${{ parameters.domain }}
          javaVersion: ${{ parameters.javaVersion }}
          javaTool: ${{ parameters.javaTool }}
          groupId: ${{ parameters.groupId }}
          packageName: ${{ parameters.packageName }}
          packagePath: ${{ parameters.packageName | replace('.', '/') }}
          springBootVersion: ${{ parameters.springBootVersion }}
          existingApiRef: ${{ parameters.existingApiRef }}
          apiName: ${{ parameters.existingApiRef | replace("api:default/", "") | replace("api:", "") }}
          apiRepoOwner: ${{ parameters.repoOwner }}
          repoProvider: ${{ parameters.repoProvider }}
          repoOwner: ${{ parameters.repoOwner }}
          gitlabHost: ${{ parameters.gitlabHost }}

    - id: fetch-api-spec-github
      name: Download OpenAPI spec (GitHub)
      if: ${{ parameters.repoProvider === 'github' }}
      action: cma:github:fetch-file
      input:
        repoOwner: ${{ parameters.repoOwner }}
        repoName: ${{ parameters.existingApiRef | replace('api:default/', '') | replace('api:', '') }}
        filePath: openapi.yaml
        branch: main
        targetPath: src/main/resources/api/openapi.yaml

    - id: fetch-api-spec-gitlab
      name: Download OpenAPI spec (GitLab)
      if: ${{ parameters.repoProvider === 'gitlab' }}
      action: fetch:plain:file
      input:
        url: https://${{ parameters.gitlabHost }}/${{ parameters.repoOwner }}/${{ parameters.existingApiRef | replace('api:default/', '') | replace('api:', '') }}/-/raw/main/openapi.yaml
        targetPath: src/main/resources/api/openapi.yaml

    - id: publish-github
      name: Publish on GitHub
      if: ${{ parameters.repoProvider === 'github' }}
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.repoOwner }}&repo=${{ parameters.name }}
        description: ${{ parameters.description }}

    - id: publish-gitlab
      name: Publish on GitLab
      if: ${{ parameters.repoProvider === 'gitlab' }}
      action: publish:gitlab
      input:
        repoUrl: ${{ parameters.gitlabHost }}?owner=${{ parameters.repoOwner }}&repo=${{ parameters.name }}
        defaultBranch: main
        description: ${{ parameters.description }}

    - id: register-catalog-github
      name: Register in catalog (GitHub)
      if: ${{ parameters.repoProvider === 'github' }}
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: register-catalog-gitlab
      name: Register in catalog (GitLab)
      if: ${{ parameters.repoProvider === 'gitlab' }}
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-gitlab'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish-github'].output.remoteUrl || steps['publish-gitlab'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        url: ${{ steps['register-catalog-github'].output.entityRef || steps['register-catalog-gitlab'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          Service **${{ parameters.name }}** créé et lié à la spec **${{ parameters.existingApiRef }}**.

          1. Clone : `git clone ${{ steps['publish-github'].output.remoteUrl || steps['publish-gitlab'].output.remoteUrl }}`
          2. Génère les stubs : `chmod +x scripts/generate-stubs.sh && ./scripts/generate-stubs.sh`
             → crée les controllers adaptés aux tags de ta spec dans `src/main/java/`
          3. Implémente la logique métier dans les controllers générés
          4. Lance le service : `mvn spring-boot:run`
          5. La relation **providesApis** est visible dans le Catalog : le service pointe vers **${{ parameters.existingApiRef }}**
