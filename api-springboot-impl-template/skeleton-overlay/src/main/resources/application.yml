info:
  app:
    tag: "env.PROJECT_VERSION"

server:
  port: 8080

spring:
  application:
    name: ${{ values.name }}

  datasource:
    url: jdbc:h2:mem:${{ values.name }};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher

management:
  server:
    port: 9090
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include:
          - "info"
          - "health"
          - "metrics"
          - "prometheus"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
    metrics:
      enabled: true
  health:
    db:
      enabled: true
    probes:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        prometheus:
          enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
