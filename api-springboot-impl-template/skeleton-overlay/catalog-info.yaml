apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  tags:
    - openapi
  links:
    - url: https://github.com/${{ values.repoOwner }}/${{ values.name }}
      title: Repository
      icon: github
{%- if values.registerOnKong %}
    - url: http://localhost:8000${{ values.kongRoutePath }}
      title: Kong Proxy URL
      icon: web
{%- endif %}
  annotations:
    backstage.io/techdocs-ref: dir:.
{%- if values.registerOnKong %}
    kong.io/service-name: ${{ values.name }}
    kong.io/route-path: ${{ values.kongRoutePath }}
{%- endif %}
spec:
  type: openapi
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: ${{ values.system }}
  domain: ${{ values.domain }}
  definition:
    $text: ./openapi.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  tags:
    - java
    - backend
    - openapi
  annotations:
    simpleicons.org/icon-slug: springboot
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: cma-cgm/${{ values.name }}/main
    sonarqube.org/project-key: cma-cgm:${{ values.name }}
{%- if values.registerOnKong %}
    kong.io/service-name: ${{ values.name }}
    kong.io/route-path: ${{ values.kongRoutePath }}
{%- endif %}
spec:
  type: service
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: ${{ values.system }}
  domain: ${{ values.domain }}
  providesApis:
    - api:default/${{ values.name }}
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ${{ values.system }}
  description: System grouping for ${{ values.name }}
spec:
  owner: ${{ values.owner }}
  domain: ${{ values.domain }}
