apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  tags:
    - java
    - backend
  links:
    - url: https://${{ values.repoProvider }}.com/${{ values.repoOwner }}/${{ values.name }}
      title: Repository
      icon: ${{ values.repoProvider }}
  annotations:
    simpleicons.org/icon-slug: springboot
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: cma-cgm/${{ values.name }}/main
    sonarqube.org/project-key: cma-cgm:${{ values.name }}
spec:
  type: service
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: ${{ values.system }}
  domain: ${{ values.domain }}
  dependsOn:
    - resource:default/${{ values.name }}-liquibase-db
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: ${{ values.name }}-liquibase-db
  description: Liquibase database migrations for ${{ values.name }}
  tags:
    - liquibase
    - database
  annotations:
    simpleicons.org/icon-slug: liquibase
    backstage.io/techdocs-ref: dir:./db
spec:
  type: liquibase
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: ${{ values.system }}
  domain: ${{ values.domain }}
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ${{ values.system }}
  description: System grouping for composable template ${{ values.name }}
spec:
  owner: ${{ values.owner }}
  domain: ${{ values.domain }}
