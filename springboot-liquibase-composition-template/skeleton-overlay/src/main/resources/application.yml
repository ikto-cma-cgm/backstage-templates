info:
  app:
    tag: "env.PROJECT_VERSION"

server:
  port: 8080

spring:
  application:
    name: ${{ values.name }}

  datasource:
{% if values.dbType == 'oracle' %}
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:1521/${DB_NAME:${{ values.name }}}
    driver-class-name: oracle.jdbc.OracleDriver
{% else %}
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:${{ values.name }}}
    driver-class-name: org.postgresql.Driver
{% endif %}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

  jpa:
{% if values.dbType == 'oracle' %}
    database-platform: org.hibernate.dialect.OracleDialect
{% else %}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
{% endif %}
    hibernate:
      ddl-auto: none

  liquibase:
    enabled: false

  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher

management:
  server:
    port: 9090
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include:
          - "info"
          - "health"
          - "metrics"
          - "prometheus"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
    metrics:
      enabled: true
  health:
    db:
      enabled: true
    probes:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        prometheus:
          enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
