server:
  port: 8080

spring:
  application:
    name: ${{ values.name }}
  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher

management:
  server:
    port: 9090
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: [info, health]
  endpoint:
    health:
      show-details: always
  health:
    probes:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
