apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: node-service-template
  title: Node.js Microservice
  description: Scaffolds a Node.js microservice with Express, TypeScript, Docker and Backstage integration.
  annotations:
    simpleicons.org/icon-slug: nodejs
    backstage.io/techdocs-ref: dir:.
  tags:
    - application
spec:
  type: service
  owner: group:default/it-development-software-engineering-developer-platform
  parameters:
    - title: Service identity
      required: [name, description, owner]
      properties:
        name:
          title: Service name
          type: string
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:help: 'Kebab-case, unique dans le Catalog. Ex: quote-pricing-api'
        description:
          title: Description
          type: string
          ui:help: 'Une phrase décrivant le service. Apparaîtra dans le Catalog.'
        owner:
          title: Owner
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Group
          ui:help: 'Équipe responsable. Sera paginée en cas d''incident.'

    - title: Catalog placement
      required: [system, domain]
      properties:
        system:
          title: System
          type: string
          ui:help: 'System Backstage auquel ce service appartient. Ex: pricing'
        domain:
          title: Domain
          type: string
          ui:help: 'Domain métier. Ex: finance, shipping, platform'

    - title: Build configuration
      required: [nodeVersion]
      properties:
        nodeVersion:
          title: Node.js version
          type: string
          enum: ['18', '20', '22']
          default: '20'
          ui:help: 'Version Node.js du runtime.'
        expressVersion:
          title: Express version
          type: string
          default: '4.21.2'
          ui:help: 'Version d''Express. Consultez les versions supportées sur expressjs.com'
        typescriptVersion:
          title: TypeScript version
          type: string
          default: '5.7.2'
          ui:help: 'Version de TypeScript.'

    - title: Repository platform
      required: [publishPlatform]
      properties:
        publishPlatform:
          title: Publish to
          type: string
          enum: ['github', 'gitlab']
          default: 'github'
          enumNames:
            - "GitHub"
            - "GitLab"
          ui:help: 'Plateforme de publication du repository (mutuellement exclusif).'

    - title: GitHub Information
      required: [githubOwner]
      properties:
        githubOwner:
          title: GitHub Owner
          type: string
          default: 'cma-cgm'
          ui:help: 'Organisation ou utilisateur GitHub propriétaire du repository.'
      when: ${{ parameters.publishPlatform === 'github' }}

    - title: GitLab Information
      required: [gitlabNamespace, gitlabHost]
      properties:
        gitlabHost:
          title: GitLab Host
          type: string
          default: 'gitlab.com'
          ui:help: 'Hôte GitLab. Ex: gitlab.com ou gitlab.cma-cgm.com'
        gitlabNamespace:
          title: GitLab Namespace
          type: string
          ui:help: 'Espace de noms GitLab pour le projet. Ex: pricing-services'
      when: ${{ parameters.publishPlatform === 'gitlab' }}

    - title: Docker configuration
      properties:
        dockerImagePrefix:
          title: Docker Image Prefix
          type: string
          default: 'eu.gcr.io/cma-cgm'
          ui:help: 'Préfixe du registry Docker.'

    - title: Architecture
      properties:
        architectureArea:
          title: Architecture Area
          type: string
          ui:help: 'Domaine d''architecture. Ex: finance, shipping, platform'

  steps:
    - id: fetch-skeleton
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          domain: ${{ parameters.domain }}
          nodeVersion: ${{ parameters.nodeVersion }}
          expressVersion: ${{ parameters.expressVersion }}
          typescriptVersion: ${{ parameters.typescriptVersion }}

    - id: publish-github
      name: Publish on GitHub
      if: ${{ parameters.publishPlatform === 'github' }}
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.githubOwner }}&repo=${{ parameters.name }}
        description: ${{ parameters.description }}

    - id: publish-gitlab
      name: Publish on GitLab
      if: ${{ parameters.publishPlatform === 'gitlab' }}
      action: publish:gitlab
      input:
        repoUrl: ${{ parameters.gitlabHost }}?owner=${{ parameters.gitlabNamespace }}&repo=${{ parameters.name }}
        defaultBranch: main
        description: ${{ parameters.description }}

    - id: register-catalog
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: "${{ parameters.publishPlatform === 'github' ? steps['publish-github'].output.repoContentsUrl : steps['publish-gitlab'].output.repoContentsUrl }}"
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: "${{ parameters.publishPlatform === 'github' ? steps['publish-github'].output.remoteUrl : steps['publish-gitlab'].output.remoteUrl }}"
      - title: Open in Catalog
        icon: catalog
        url: ${{ steps['register-catalog'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          Service **${{ parameters.name }}** créé avec succès.
          1. Clone : `git clone ${{ parameters.publishPlatform === 'github' ? steps['publish-github'].output.remoteUrl : steps['publish-gitlab'].output.remoteUrl }}`
          2. Installez les dépendances : `npm install`
          3. Lancez localement : `npm run dev`
          4. Le pipeline CI démarre automatiquement au premier push
